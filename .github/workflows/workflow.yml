# Publishes to PyPI using Trusted Publishing (OIDC) — no API token needed.
#
# One-time setup on PyPI:
#   1. https://pypi.org/manage/account/publishing/ → "Add a new pending publisher"
#   2. Project name:      tiny-claude-recycler
#      Owner:             lucastononro
#      Repository name:   tiny-claude-recycler
#      Workflow filename: workflow.yml
#      Environment name:  pypi
#
# How to release:
#   - Bump `version` in pyproject.toml and tcr/__init__.py
#   - Commit, tag (`git tag vX.Y.Z`), push tag
#   - Create a GitHub Release pointing at the tag — this workflow fires
#   - Or run it manually from the Actions tab (workflow_dispatch)

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build backend
        run: pip install build
      - name: Build sdist + wheel
        run: python -m build
      - name: Verify version matches tag
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag $TAG does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tiny-claude-recycler/
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
